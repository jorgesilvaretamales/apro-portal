<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>APRO Portal</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --cream:#FAF8F5;--obsidian:#0E0E0E;--charcoal:#1C1C1C;--warm-gray:#6B6560;
  --border:#E8E4DF;--accent:#C8A97A;--accent-dark:#A07840;--danger:#C0392B;
  --success:#2E7D52;--surface:#FFFFFF;--surface2:#F5F2EE;
}
body{font-family:'DM Sans',sans-serif;background:var(--cream);color:var(--obsidian);min-height:100vh;font-size:14px}
h1,h2,h3,h4{font-family:'Cormorant Garamond',serif}
#loading-overlay{position:fixed;inset:0;background:rgba(14,14,14,0.75);display:none;align-items:center;justify-content:center;z-index:2000}
.loading-box{background:var(--surface);padding:2rem 3rem;text-align:center;border-top:3px solid var(--accent);min-width:280px}
.spinner{width:32px;height:32px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 1rem}
@keyframes spin{to{transform:rotate(360deg)}}
#loading-msg{font-size:1rem;font-weight:500;margin-bottom:4px;font-family:'Cormorant Garamond',serif}
#loading-sub{font-size:12px;color:var(--warm-gray)}
.toast{position:fixed;bottom:2rem;right:2rem;background:var(--obsidian);color:#fff;padding:0.8rem 1.5rem;font-size:13px;z-index:9999;transform:translateY(100px);opacity:0;transition:all 0.3s;border-left:3px solid var(--accent);max-width:360px;line-height:1.4}
.toast.show{transform:translateY(0);opacity:1}
.toast.error{border-left-color:var(--danger)}
#auth-screen{position:fixed;inset:0;background:var(--obsidian);display:flex;align-items:center;justify-content:center;z-index:1000}
.auth-box{background:var(--surface);padding:3rem 2.5rem;width:400px;border-top:3px solid var(--accent)}
.auth-logo{font-family:'Cormorant Garamond',serif;font-size:2.4rem;font-weight:300;letter-spacing:0.2em;color:var(--obsidian);margin-bottom:4px}
.auth-logo span{color:var(--accent)}
.auth-sub{font-size:11px;letter-spacing:0.2em;text-transform:uppercase;color:var(--warm-gray);margin-bottom:2.5rem}
.auth-box input{width:100%;border:none;border-bottom:1px solid var(--border);padding:0.7rem 0;font-family:'DM Sans',sans-serif;font-size:14px;background:transparent;color:var(--obsidian);outline:none;margin-bottom:1.5rem;transition:border-color 0.2s}
.auth-box input:focus{border-bottom-color:var(--accent)}
.auth-box input::placeholder{color:var(--warm-gray)}
.btn-primary{width:100%;background:var(--obsidian);color:#fff;border:none;padding:0.9rem;font-family:'DM Sans',sans-serif;font-size:13px;letter-spacing:0.1em;text-transform:uppercase;cursor:pointer;transition:background 0.2s}
.btn-primary:hover{background:var(--charcoal)}
.auth-error{color:var(--danger);font-size:12px;margin-bottom:1rem;display:none;padding:0.5rem;background:rgba(192,57,43,0.06);border-left:2px solid var(--danger)}
.link-btn{text-align:center;margin-top:1rem;font-size:12px;color:var(--warm-gray);cursor:pointer;text-decoration:underline}
.link-btn:hover{color:var(--obsidian)}
#app{display:none;min-height:100vh;flex-direction:column}
header{background:var(--obsidian);color:#fff;display:flex;align-items:center;justify-content:space-between;padding:0 2rem;height:56px;position:sticky;top:0;z-index:100}
.header-logo{font-family:'Cormorant Garamond',serif;font-size:1.6rem;font-weight:300;letter-spacing:0.2em}
.header-logo span{color:var(--accent)}
.header-nav{display:flex}
.nav-btn{background:none;border:none;color:rgba(255,255,255,0.55);padding:0 1.2rem;height:56px;cursor:pointer;font-size:11px;letter-spacing:0.15em;text-transform:uppercase;font-family:'DM Sans',sans-serif;transition:color 0.2s;border-bottom:2px solid transparent}
.nav-btn:hover,.nav-btn.active{color:#fff;border-bottom-color:var(--accent)}
.header-right{display:flex;align-items:center;gap:0.8rem}
.sync-status{font-size:11px;color:rgba(255,255,255,0.35)}
.sync-btn{background:none;border:1px solid rgba(200,169,122,0.4);color:var(--accent);padding:0.3rem 0.9rem;cursor:pointer;font-size:11px;font-family:'DM Sans',sans-serif;transition:all 0.2s;white-space:nowrap}
.sync-btn:hover{background:var(--accent);color:#fff}
.sync-btn:disabled{opacity:0.4;cursor:not-allowed}
.user-badge{font-size:12px;color:rgba(255,255,255,0.55)}
.logout-btn{background:none;border:1px solid rgba(255,255,255,0.2);color:rgba(255,255,255,0.55);padding:0.3rem 0.8rem;cursor:pointer;font-size:11px;font-family:'DM Sans',sans-serif;transition:all 0.2s}
.logout-btn:hover{border-color:var(--accent);color:var(--accent)}
main{flex:1;padding:2rem}
.section{display:none}.section.active{display:block}
.search-header{display:flex;align-items:center;gap:1rem;margin-bottom:2rem;flex-wrap:wrap}
.search-title{font-size:1.8rem;font-weight:400;color:var(--obsidian);flex:0 0 auto}
.search-wrap{flex:1;position:relative;min-width:200px;max-width:520px}
.search-input{width:100%;border:none;border-bottom:2px solid var(--obsidian);background:transparent;padding:0.6rem 2.5rem 0.6rem 0;font-size:15px;font-family:'DM Sans',sans-serif;color:var(--obsidian);outline:none;transition:border-color 0.2s}
.search-input:focus{border-bottom-color:var(--accent)}
.search-input::placeholder{color:var(--warm-gray)}
.search-icon{position:absolute;right:0;top:50%;transform:translateY(-50%);color:var(--warm-gray);font-size:18px;pointer-events:none}
.results-list{display:flex;flex-direction:column}
.result-item{border:1px solid var(--border);border-bottom:none;padding:1rem 1.5rem;cursor:pointer;background:var(--surface);display:flex;align-items:center;justify-content:space-between;transition:background 0.15s}
.result-item:first-child{border-top:2px solid var(--accent)}
.result-item:last-child{border-bottom:1px solid var(--border)}
.result-item:hover{background:var(--surface2)}
.result-label{font-size:11px;color:var(--warm-gray);text-transform:uppercase;letter-spacing:0.1em;margin-bottom:2px}
.result-value{font-size:15px;font-weight:500}
.result-meta{display:flex;gap:2rem;flex-wrap:wrap}
.result-arrow{color:var(--accent);font-size:20px;flex-shrink:0}
.badge{display:inline-block;padding:2px 8px;font-size:11px;background:var(--surface2);border:1px solid var(--border);color:var(--warm-gray)}
.badge-accent{background:rgba(200,169,122,0.15);border-color:var(--accent);color:var(--accent-dark)}
.no-data{text-align:center;padding:4rem 2rem;color:var(--warm-gray)}
.no-data h3{font-family:'Cormorant Garamond',serif;font-size:1.5rem;font-weight:400;margin-bottom:0.5rem}
.no-data p{font-size:13px;line-height:1.6;margin-top:0.3rem}
.detail-view{display:none}
.detail-header{display:flex;align-items:center;gap:1.5rem;margin-bottom:2rem;padding-bottom:1.5rem;border-bottom:1px solid var(--border)}
.back-btn{background:none;border:none;cursor:pointer;color:var(--warm-gray);font-size:12px;letter-spacing:0.1em;text-transform:uppercase;font-family:'DM Sans',sans-serif;display:flex;align-items:center;gap:0.5rem;padding:0;flex-shrink:0;transition:color 0.2s}
.back-btn:hover{color:var(--obsidian)}
.detail-title{font-size:1.7rem;font-weight:400;font-family:'Cormorant Garamond',serif}
.detail-subtitle{font-size:13px;color:var(--warm-gray);margin-top:3px}
.factura-card{margin-bottom:1.5rem;border:1px solid var(--border);background:var(--surface)}
.factura-head{background:var(--obsidian);color:#fff;padding:1rem 1.5rem;display:flex;align-items:center;gap:2rem;flex-wrap:wrap}
.fh-label{font-size:10px;letter-spacing:0.15em;text-transform:uppercase;color:rgba(255,255,255,0.45);margin-bottom:3px}
.fh-value{font-size:14px;font-weight:500}
.factura-num{font-family:'Cormorant Garamond',serif;font-size:1.4rem;font-weight:500;color:var(--accent);margin-right:0.5rem;white-space:nowrap}
.sinfact-head{background:var(--warm-gray);color:#fff;padding:1rem 1.5rem;display:flex;align-items:center;gap:2rem;flex-wrap:wrap}
.detail-table-wrap{overflow-x:auto}
.detail-table{width:100%;border-collapse:collapse;font-size:13px}
.detail-table th{padding:0.6rem 1rem;background:var(--surface2);text-align:left;font-weight:500;font-size:11px;letter-spacing:0.08em;text-transform:uppercase;color:var(--warm-gray);border-bottom:1px solid var(--border);white-space:nowrap}
.detail-table td{padding:0.7rem 1rem;border-bottom:1px solid var(--border);vertical-align:middle;white-space:nowrap}
.detail-table tr:last-child td{border-bottom:none}
.detail-table tr:hover td{background:var(--surface2)}
.neg{color:var(--danger);font-weight:500}
.muted{color:var(--warm-gray)}
.product-result{border:1px solid var(--border);border-bottom:none;background:var(--surface);cursor:pointer;transition:background 0.15s}
.product-result:first-child{border-top:2px solid var(--accent)}
.product-result:last-child{border-bottom:1px solid var(--border)}
.product-result-inner{padding:1rem 1.5rem;display:flex;align-items:center;justify-content:space-between;gap:1rem}
.product-result:hover{background:var(--surface2)}
.product-model{font-family:'Cormorant Garamond',serif;font-size:1.2rem;font-weight:500}
.product-meta-tags{display:flex;gap:0.5rem;flex-wrap:wrap;margin-top:6px}
.product-detail-head{padding:1.5rem;background:var(--obsidian);color:#fff;display:flex;align-items:flex-start;justify-content:space-between;gap:1rem;flex-wrap:wrap}
.product-detail-model{font-family:'Cormorant Garamond',serif;font-size:2rem;font-weight:400;letter-spacing:0.05em}
.product-price{font-family:'Cormorant Garamond',serif;font-size:1.6rem;color:var(--accent);font-weight:500}
.price-label{font-size:10px;letter-spacing:0.15em;text-transform:uppercase;color:rgba(255,255,255,0.45);margin-bottom:4px}
.genero-section{border-left:3px solid var(--accent);margin:1.5rem 0 0.8rem;padding-left:1rem}
.genero-label{font-size:10px;letter-spacing:0.2em;text-transform:uppercase;color:var(--warm-gray);margin-bottom:2px}
.genero-title{font-family:'Cormorant Garamond',serif;font-size:1.1rem;font-weight:500}
.color-section{padding-left:1rem;margin-bottom:1.5rem}
.color-title{font-size:11px;font-weight:500;letter-spacing:0.12em;text-transform:uppercase;color:var(--warm-gray);margin-bottom:0.6rem;padding:0.4rem 0;border-bottom:1px solid var(--border)}
.admin-layout{display:grid;grid-template-columns:1fr 340px;gap:2rem;align-items:start}
.admin-users-list{background:var(--surface);border:1px solid var(--border)}
.admin-form{background:var(--surface);border:1px solid var(--border);padding:1.5rem;position:sticky;top:72px}
.admin-form h3{font-size:1.2rem;font-weight:400;margin-bottom:1.5rem;padding-bottom:1rem;border-bottom:1px solid var(--border);font-family:'Cormorant Garamond',serif}
.form-field{margin-bottom:1.2rem}
.form-label{font-size:11px;letter-spacing:0.1em;text-transform:uppercase;color:var(--warm-gray);margin-bottom:6px;display:block}
.form-input{width:100%;border:none;border-bottom:1px solid var(--border);padding:0.5rem 0;font-family:'DM Sans',sans-serif;font-size:14px;background:transparent;color:var(--obsidian);outline:none;transition:border-color 0.2s}
.form-input:focus{border-bottom-color:var(--accent)}
.form-actions{display:flex;gap:0.8rem;margin-top:1.5rem;flex-wrap:wrap}
.btn-sm{padding:0.5rem 1.2rem;font-size:12px;letter-spacing:0.08em;text-transform:uppercase;cursor:pointer;font-family:'DM Sans',sans-serif;border:1px solid var(--obsidian);background:var(--obsidian);color:#fff;transition:all 0.2s}
.btn-sm:hover{background:var(--charcoal)}
.btn-sm-outline{background:transparent;color:var(--obsidian)}
.btn-sm-outline:hover{background:var(--surface2)}
.btn-danger{border-color:var(--danger);background:var(--danger);color:#fff}
.user-row{padding:0.9rem 1.5rem;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;cursor:pointer;transition:background 0.15s}
.user-row:last-child{border-bottom:none}
.user-row:hover{background:var(--surface2)}
.user-row.selected{background:rgba(200,169,122,0.08);border-left:3px solid var(--accent)}
.user-name{font-weight:500;font-size:14px}
.user-meta{font-size:12px;color:var(--warm-gray);margin-top:2px}
.status-dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:6px}
.status-dot.active{background:var(--success)}
.status-dot.inactive{background:#ccc}
.toggle-switch{position:relative;width:36px;height:20px;flex-shrink:0}
.toggle-switch input{opacity:0;width:0;height:0;position:absolute}
.toggle-slider{position:absolute;cursor:pointer;inset:0;background:#ddd;border-radius:20px;transition:0.2s}
.toggle-slider:before{content:'';position:absolute;width:14px;height:14px;left:3px;bottom:3px;background:#fff;border-radius:50%;transition:0.2s}
.toggle-switch input:checked+.toggle-slider{background:var(--success)}
.toggle-switch input:checked+.toggle-slider:before{transform:translateX(16px)}
</style>
</head>
<body>

<div id="loading-overlay" style="display:none">
  <div class="loading-box">
    <div class="spinner"></div>
    <div id="loading-msg">Cargando...</div>
    <div id="loading-sub"></div>
  </div>
</div>
<div class="toast" id="toast"></div>

<!-- AUTH -->
<div id="auth-screen">
  <div class="auth-box">
    <div class="auth-logo">A<span>P</span>RO</div>
    <div class="auth-sub">Portal de Ventas</div>
    <div class="auth-error" id="login-error"></div>
    <input type="text" id="login-user" placeholder="Usuario o correo" autocomplete="username">
    <input type="password" id="login-pass" placeholder="Contraseña" autocomplete="current-password" onkeydown="if(event.key==='Enter')doLogin()">
    <button class="btn-primary" onclick="doLogin()">Ingresar</button>
    <div class="link-btn" onclick="toggleChangePass(true)">Cambiar contraseña</div>
  </div>
</div>

<!-- CHANGE PASS MODAL -->
<div id="cp-modal" style="display:none;position:fixed;inset:0;background:rgba(14,14,14,0.85);z-index:1100;align-items:center;justify-content:center">
  <div class="auth-box" style="width:380px">
    <div style="font-family:'Cormorant Garamond',serif;font-size:1.4rem;margin-bottom:1.5rem;font-weight:400">Cambiar contraseña</div>
    <div class="auth-error" id="cp-error"></div>
    <input type="text" id="cp-user" placeholder="Usuario o correo">
    <input type="password" id="cp-old" placeholder="Contraseña actual">
    <input type="password" id="cp-new1" placeholder="Nueva contraseña">
    <input type="password" id="cp-new2" placeholder="Confirmar nueva contraseña">
    <button class="btn-primary" onclick="doChangePass()">Guardar</button>
    <div class="link-btn" onclick="toggleChangePass(false)">Cancelar</div>
  </div>
</div>

<!-- APP -->
<div id="app" style="display:none;flex-direction:column;min-height:100vh">
  <header>
    <div class="header-logo">A<span>P</span>RO</div>
    <nav class="header-nav">
      <button class="nav-btn active" onclick="showSection('oc')" id="nav-oc">Buscar OC</button>
      <button class="nav-btn" onclick="showSection('productos')" id="nav-productos">Productos</button>
      <button class="nav-btn" onclick="showSection('admin')" id="nav-admin" style="display:none">Mantenedor</button>
    </nav>
    <div class="header-right">
      <span class="sync-status" id="sync-status"></span>
      <button class="sync-btn" id="sync-btn" onclick="syncData()">⟳ Sincronizar</button>
      <span class="user-badge" id="user-badge"></span>
      <button class="logout-btn" onclick="doLogout()">Salir</button>
    </div>
  </header>
  <main>

    <!-- OC -->
    <div class="section active" id="section-oc">
      <div id="oc-list-view">
        <div class="search-header">
          <div class="search-title">Buscar OC</div>
          <div class="search-wrap">
            <input class="search-input" id="oc-search" placeholder="Sucursal, OC, OV, Factura, Código, Modelo..." oninput="searchOC(this.value)">
            <span class="search-icon">⌕</span>
          </div>
        </div>
        <div id="oc-results"></div>
      </div>
      <div class="detail-view" id="oc-detail-view">
        <div class="detail-header">
          <button class="back-btn" onclick="backToList('oc')">← Volver</button>
          <div>
            <div class="detail-title" id="oc-detail-title"></div>
            <div class="detail-subtitle" id="oc-detail-sub"></div>
          </div>
        </div>
        <div id="oc-detail-content"></div>
      </div>
    </div>

    <!-- PRODUCTOS -->
    <div class="section" id="section-productos">
      <div id="prod-list-view">
        <div class="search-header">
          <div class="search-title">Productos</div>
          <div class="search-wrap">
            <input class="search-input" id="prod-search" placeholder="Modelo, Código, Color, Género..." oninput="searchProducts(this.value)">
            <span class="search-icon">⌕</span>
          </div>
        </div>
        <div id="prod-results"></div>
      </div>
      <div class="detail-view" id="prod-detail-view">
        <div class="detail-header">
          <button class="back-btn" onclick="backToList('prod')">← Volver</button>
          <div><div class="detail-title" id="prod-detail-title"></div></div>
        </div>
        <div id="prod-detail-content"></div>
      </div>
    </div>

    <!-- MANTENEDOR -->
    <div class="section" id="section-admin">
      <div class="search-header">
        <div class="search-title">Mantenedor de Usuarios</div>
        <div class="search-wrap">
          <input class="search-input" id="admin-search" placeholder="Nombre, sucursal, correo..." oninput="renderAdminUsers(this.value)">
          <span class="search-icon">⌕</span>
        </div>
        <button style="background:none;border:1px solid var(--accent);color:var(--accent-dark);padding:0.5rem 1rem;cursor:pointer;font-size:12px;letter-spacing:0.1em;text-transform:uppercase;font-family:'DM Sans',sans-serif" onclick="newUser()">+ Nuevo Usuario</button>
      </div>
      <div class="admin-layout">
        <div class="admin-users-list" id="admin-users-list"></div>
        <div class="admin-form">
          <h3 id="form-title">Nuevo usuario</h3>
          <div class="form-field"><label class="form-label">Nombre</label><input class="form-input" id="f-nombre" placeholder="Nombre completo"></div>
          <div class="form-field"><label class="form-label">Sucursal</label><input class="form-input" id="f-sucursal" placeholder="Sucursal"></div>
          <div class="form-field"><label class="form-label">Correo</label><input class="form-input" id="f-mail" type="email" placeholder="correo@empresa.cl"></div>
          <div class="form-field"><label class="form-label">Contraseña</label><input class="form-input" id="f-pass" type="password" placeholder="Contraseña de acceso"></div>
          <div class="form-field"><label class="form-label">Rol</label>
            <select class="form-input" id="f-rol" style="cursor:pointer">
              <option value="user">Usuario</option>
              <option value="admin">Administrador</option>
            </select>
          </div>
          <div class="form-actions">
            <button class="btn-sm" onclick="saveUser()">Guardar</button>
            <button class="btn-sm btn-sm-outline" onclick="cancelUser()">Cancelar</button>
            <button class="btn-sm btn-danger" id="btn-delete" onclick="deleteUser()" style="display:none;margin-left:auto">Eliminar</button>
          </div>
        </div>
      </div>
    </div>

  </main>
</div>

<script>
const SHEET_ID = '15zEFwWunTGzxpsHYI_GrG4ztTuw4IMpwJHJyWifXWjo';

let DB = {ventas:[], base:[]};
let USERS = JSON.parse(localStorage.getItem('apro_users')||'[]');
let SESSION = JSON.parse(sessionStorage.getItem('apro_session')||'null');
let OC_INDEX=[], PROD_INDEX=[], editingUserId=null;

if(!USERS.length){
  USERS=[{id:1,nombre:'Administrador',sucursal:'Central',mail:'admin@apro.cl',pass:'admin123',rol:'admin',activo:true}];
  saveUsers();
}
function saveUsers(){localStorage.setItem('apro_users',JSON.stringify(USERS));}

// ── GOOGLE SHEETS ──
async function fetchSheet(name){
  const url=`https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(name)}`;
  const r=await fetch(url);
  if(!r.ok) throw new Error('Error al conectar con Google Sheets ('+r.status+')');
  const txt=await r.text();
  const json=JSON.parse(txt.replace(/^[^(]+\(|\);?\s*$/g,''));
  const cols=json.table.cols.map(c=>c.label||'');
  return json.table.rows.map(row=>{
    const obj={};
    (row.c||[]).forEach((cell,i)=>{obj[cols[i]]=cell?(cell.v!==null&&cell.v!==undefined?cell.v:''):'';});
    return obj;
  });
}

async function syncData(){
  const btn=document.getElementById('sync-btn');
  if(btn) btn.disabled=true;
  showLoading('Sincronizando...','Leyendo Google Sheets');
  try{
    const [base,ventas]=await Promise.all([fetchSheet('Base'),fetchSheet('Ventas')]);
    DB.base=base; DB.ventas=ventas;
    const h=new Date().toLocaleTimeString('es-CL',{hour:'2-digit',minute:'2-digit'});
    const ss=document.getElementById('sync-status');
    if(ss) ss.textContent='✓ '+h;
    showToast('Sincronizado · '+DB.base.length+' productos · '+DB.ventas.length+' líneas');
    const oq=document.getElementById('oc-search'); if(oq&&oq.value) searchOC(oq.value);
    const pq=document.getElementById('prod-search'); if(pq&&pq.value) searchProducts(pq.value);
  }catch(e){showToast('Error: '+e.message,true);}
  hideLoading();
  if(btn) btn.disabled=false;
}

// ── AUTH ──
function doLogin(){
  const u=document.getElementById('login-user').value.trim();
  const p=document.getElementById('login-pass').value;
  const user=USERS.find(x=>x.activo&&(x.mail===u||x.nombre===u)&&x.pass===p);
  const err=document.getElementById('login-error'); err.style.display='none';
  if(!user){err.textContent='Usuario o contraseña incorrectos';err.style.display='block';return;}
  SESSION={id:user.id,nombre:user.nombre,rol:user.rol,sucursal:user.sucursal};
  sessionStorage.setItem('apro_session',JSON.stringify(SESSION));
  startApp();
}

function toggleChangePass(show){
  document.getElementById('cp-modal').style.display=show?'flex':'none';
  if(!show){['cp-user','cp-old','cp-new1','cp-new2'].forEach(id=>document.getElementById(id).value=''); document.getElementById('cp-error').style.display='none';}
}
function doChangePass(){
  const u=document.getElementById('cp-user').value.trim();
  const o=document.getElementById('cp-old').value;
  const n1=document.getElementById('cp-new1').value;
  const n2=document.getElementById('cp-new2').value;
  const err=document.getElementById('cp-error'); err.style.display='none';
  const user=USERS.find(x=>(x.mail===u||x.nombre===u)&&x.pass===o);
  if(!user){err.textContent='Usuario o contraseña actual incorrectos';err.style.display='block';return;}
  if(n1.length<4){err.textContent='Mínimo 4 caracteres';err.style.display='block';return;}
  if(n1!==n2){err.textContent='Las contraseñas no coinciden';err.style.display='block';return;}
  user.pass=n1; saveUsers(); toggleChangePass(false); showToast('Contraseña actualizada');
}

function startApp(){
  document.getElementById('auth-screen').style.display='none';
  document.getElementById('app').style.display='flex';
  document.getElementById('user-badge').textContent=SESSION.nombre+' · '+SESSION.sucursal;
  if(SESSION.rol==='admin') document.getElementById('nav-admin').style.display='';
  renderAdminUsers(); showSection('oc'); renderOCEmpty();
  document.getElementById('prod-results').innerHTML='<div class="no-data"><h3>Busca un producto</h3><p>Ingresa modelo, código, color o género.</p></div>';
  syncData();
}

function doLogout(){
  SESSION=null; sessionStorage.removeItem('apro_session');
  document.getElementById('app').style.display='none';
  document.getElementById('auth-screen').style.display='flex';
}

if(SESSION) startApp();

// ── NAV ──
function showSection(id){

  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));

function backToList(t){
  if(t==='oc'){document.getElementById('oc-list-view').style.display='';document.getElementById('oc-detail-view').style.display='none';}

// ── OC ──
function renderOCEmpty(){
  document.getElementById('oc-results').innerHTML='<div class="no-data"><h3>Ingresa un término de búsqueda</h3><p>Sucursal, orden de compra, orden de venta, factura, código o modelo.</p></div>';
}

function searchOC(q){
  if(!q.trim()){renderOCEmpty();return;}
  if(!DB.ventas.length){document.getElementById('oc-results').innerHTML='<div class="no-data"><h3>Sin datos</h3><p>Presiona ⟳ Sincronizar para cargar los datos.</p></div>';return;}
  const nq=norm(q);
  const fields=['Sucursal','Orden de Compra','Orden de Venta','N° Factura','Codigo','Modelo'];
  const matches=DB.ventas.filter(r=>fields.some(f=>norm(r[f]).includes(nq)));
  const groups={};
  matches.forEach(r=>{const oc=String(r['Orden de Compra']||'(sin OC)');if(!groups[oc])groups[oc]={rows:[],sucursal:r['Sucursal'],oc};groups[oc].rows.push(r);});
  const keys=Object.keys(groups);
  if(!keys.length){document.getElementById('oc-results').innerHTML='<div class="no-data"><h3>Sin resultados</h3><p>No se encontraron coincidencias.</p></div>';return;}
  OC_INDEX=keys;
  let html='<div class="results-list">';
  keys.forEach((oc,idx)=>{
    const g=groups[oc];
    const facts=[...new Set(g.rows.map(r=>r['N° Factura']).filter(f=>f&&norm(String(f))!=='sin facturar'))];
    const fl=facts.length?facts.slice(0,2).join(', ')+(facts.length>2?'…':''):'Sin facturar';
    html+=`<div class="result-item" onclick="showOCDetail(${idx})">
      <div class="result-meta">
        <div><div class="result-label">Sucursal</div><div class="result-value">${esc(g.sucursal)}</div></div>
        <div><div class="result-label">Orden de Compra</div><div class="result-value">${esc(oc)}</div></div>
        <div><div class="result-label">Facturas</div><div class="result-value"><span class="badge">${esc(fl)}</span></div></div>
        <div><div class="result-label">Líneas</div><div class="result-value">${g.rows.length}</div></div>
      </div><span class="result-arrow">›</span></div>`;
  });
  html+='</div>';
  document.getElementById('oc-results').innerHTML=html;
}

function showOCDetail(idx){
  const oc=OC_INDEX[idx]; if(!oc) return;
  const rows=DB.ventas.filter(r=>String(r['Orden de Compra']||'(sin OC)')===oc);
  document.getElementById('oc-list-view').style.display='none';
  document.getElementById('oc-detail-view').style.display='block';
  document.getElementById('oc-detail-title').textContent='OC '+oc;
  document.getElementById('oc-detail-sub').textContent=(rows[0]&&rows[0]['Sucursal'])||'';
  const fm={};
  rows.forEach(r=>{const fn=r['N° Factura'];const k=(fn&&norm(String(fn))!=='sin facturar'&&String(fn).trim())?String(fn):'__SF__';if(!fm[k])fm[k]=[];fm[k].push(r);});
  let html='';
  Object.keys(fm).filter(k=>k!=='__SF__').forEach(fn=>{
    const fr=fm[fn][0];
    html+=`<div class="factura-card"><div class="factura-head">
      <span class="factura-num">${esc(fn)}</span>
      <div><div class="fh-label">Orden de Venta</div><div class="fh-value">${esc(fr['Orden de Venta']||'—')}</div></div>
      <div><div class="fh-label">Fecha OV</div><div class="fh-value">${fmtF(fr['Fecha orden de venta'])}</div></div>
      <div><div class="fh-label">Fecha Factura</div><div class="fh-value">${fmtF(fr['Fecha de Factura'])}</div></div>
      ${fr['Comentarios']?`<div><div class="fh-label">Comentarios</div><div class="fh-value">${esc(fr['Comentarios'])}</div></div>`:''}
    </div>${buildOCTable(fm[fn])}</div>`;
  });
  if(fm['__SF__']){
    const sfr=fm['__SF__'][0];
    html+=`<div class="factura-card"><div class="sinfact-head">
      <div><div class="fh-label">Estado</div><div class="fh-value">Sin Facturar</div></div>
      <div><div class="fh-label">Orden de Venta</div><div class="fh-value">${esc(sfr['Orden de Venta']||'—')}</div></div>
      <div><div class="fh-label">Fecha OV</div><div class="fh-value">${fmtF(sfr['Fecha orden de venta'])}</div></div>
    </div>${buildOCTable(fm['__SF__'])}</div>`;
  }
  document.getElementById('oc-detail-content').innerHTML=html;
}

function buildOCTable(rows){
  return `<div class="detail-table-wrap"><table class="detail-table">
    <thead><tr>
      <th rowspan="2">Artículo</th><th rowspan="2">Código</th>
      <th rowspan="2" style="text-align:right">Facturado</th><th rowspan="2" style="text-align:right">Solicitado</th>
      <th rowspan="2" style="text-align:right">Pendiente</th><th rowspan="2" style="text-align:right">Disponible</th>
      <th colspan="2" style="text-align:center;background:rgba(200,169,122,0.1);color:var(--accent-dark)">Próxima Llegada</th>
      <th colspan="5" style="text-align:center;background:var(--surface2);color:var(--warm-gray)">Stock</th>
    </tr><tr>
      <th style="background:rgba(200,169,122,0.06)">Fecha</th><th style="background:rgba(200,169,122,0.06);text-align:right">Cant. Disp.</th>
      <th style="text-align:right">Pudahuel</th><th style="text-align:right">Presencial</th>
      <th style="text-align:right">Antofagasta</th><th style="text-align:right">Res. APRO</th><th style="text-align:right">Recepción</th>
    </tr></thead><tbody>`+
    rows.map(r=>`<tr>
      <td>${esc(String(r['Articulo']||r['Artículo']||''))}</td>
      <td style="font-family:monospace;font-size:12px">${esc(String(r['Codigo']||''))}</td>
      <td style="text-align:right">${esc(String(r['Cantidad Facturada']??'—'))}</td>
      <td style="text-align:right">${esc(String(r['Cantidad Solicitada']??'—'))}</td>
      <td style="text-align:right">${fmtN(r['Cantidad Pendiente'])}</td>
      <td style="text-align:right">${fmtN(r['Disponible para facturar'])}</td>
      <td style="background:rgba(200,169,122,0.04);font-size:12px">${fmtF(r['Fecha Prox Llegada'])}</td>
      <td style="background:rgba(200,169,122,0.04);text-align:right">${esc(String(r['prox Llegada (disponible)']??r['Prox Llegada (disponible)']??'—'))}</td>
      <td style="text-align:right">${fmtS(r['Pudahuel'])}</td><td style="text-align:right">${fmtS(r['Presencial'])}</td>
      <td style="text-align:right">${fmtS(r['Antofagasta'])}</td><td style="text-align:right">${fmtS(r['Reserva APRO'])}</td>
      <td style="text-align:right">${fmtS(r['Recepción']||r['Recepcion']||'')}</td>
    </tr>`).join('')+
    '</tbody></table></div>';
}

// ── PRODUCTOS ──
function searchProducts(q){
  const el=document.getElementById('prod-results');
  if(!q.trim()){el.innerHTML='<div class="no-data"><h3>Busca un producto</h3><p>Ingresa modelo, código, color o género.</p></div>';return;}
  if(!DB.base.length){el.innerHTML='<div class="no-data"><h3>Sin datos</h3><p>Presiona ⟳ Sincronizar.</p></div>';return;}
  const words=norm(q).split(/\s+/).filter(Boolean);
  const fields=['Modelo','Codigo','Cod APRO','Color','H/M'];
  const matches=DB.base.filter(r=>{const hay=fields.map(f=>norm(r[f])).join(' ');return words.every(w=>hay.includes(w));});
  const mm={};
  matches.forEach(r=>{const m=String(r['Modelo']||'(sin modelo)');if(!mm[m])mm[m]=[];mm[m].push(r);});
  const mkeys=Object.keys(mm);
  if(!mkeys.length){el.innerHTML='<div class="no-data"><h3>Sin resultados</h3><p>Prueba con otros términos.</p></div>';return;}
  PROD_INDEX=mkeys;
  let html='<div class="results-list">';
  mkeys.forEach((m,idx)=>{
    const rows=mm[m];
    const colors=[...new Set(rows.map(r=>String(r['Color']||'')).filter(Boolean))];
    const hm=[...new Set(rows.map(r=>String(r['H/M']||'')).filter(Boolean))];
    const precio=rows[0]&&rows[0]['Precio APRO'];
    html+=`<div class="product-result" onclick="showProductDetail(${idx})">
      <div class="product-result-inner">
        <div>
          <div class="product-model">${esc(m)}</div>
          <div class="product-meta-tags">
            ${hm.map(h=>`<span class="badge badge-accent">${esc(h==='H'?'Hombre':h==='M'?'Mujer':h)}</span>`).join('')}
            ${colors.slice(0,6).map(c=>`<span class="badge">${esc(c)}</span>`).join('')}
            <span class="badge">${rows.length} artículo(s)</span>
          </div>
        </div>
        <div style="display:flex;align-items:center;gap:1.5rem">
          ${precio?`<div style="text-align:right"><div style="font-size:11px;color:var(--warm-gray);text-transform:uppercase;letter-spacing:0.1em">Precio APRO</div><div style="font-family:'Cormorant Garamond',serif;font-size:1.3rem;font-weight:500">${fmtP(precio)}</div></div>`:''}
          <span class="result-arrow">›</span>
        </div>
      </div></div>`;
  });
  html+='</div>'; el.innerHTML=html;
}

function showProductDetail(idx){
  const modelo=PROD_INDEX[idx]; if(!modelo) return;
  const rows=DB.base.filter(r=>String(r['Modelo']||'(sin modelo)')===modelo);
  document.getElementById('prod-list-view').style.display='none';
  document.getElementById('prod-detail-view').style.display='block';
  document.getElementById('prod-detail-title').textContent=modelo;
  const precio=rows[0]&&rows[0]['Precio APRO'];
  const hmMap={};
  rows.forEach(r=>{const hm=String(r['H/M']||'Sin género'),col=String(r['Color']||'Sin color');if(!hmMap[hm])hmMap[hm]={};if(!hmMap[hm][col])hmMap[hm][col]=[];hmMap[hm][col].push(r);});
  let html=`<div style="border:1px solid var(--border)">
    <div class="product-detail-head">
      <div><div class="product-detail-model">${esc(modelo)}</div></div>
      ${precio?`<div style="text-align:right"><div class="price-label">Precio APRO</div><div class="product-price">${fmtP(precio)}</div></div>`:''}
    </div><div style="padding:1.5rem">`;
  Object.keys(hmMap).forEach(hm=>{
    html+=`<div class="genero-section"><div class="genero-label">Género</div><div class="genero-title">${esc(hm==='H'?'Hombre':hm==='M'?'Mujer':hm)}</div></div>`;
    Object.keys(hmMap[hm]).forEach(col=>{
      html+=`<div class="color-section"><div class="color-title">${esc(col)}</div>
        <div class="detail-table-wrap"><table class="detail-table">
          <thead><tr>
            <th rowspan="2">Descripción</th><th rowspan="2">Código</th><th rowspan="2">Cód APRO</th>
            <th rowspan="2">EAN13</th><th rowspan="2" style="text-align:center">Cant x Caja</th>
            <th colspan="5" style="text-align:center;background:var(--surface2);color:var(--warm-gray)">Stock</th>
            <th colspan="2" style="text-align:center;background:rgba(200,169,122,0.08);color:var(--accent-dark)">Próxima Llegada</th>
          </tr><tr>
            <th style="text-align:right">Pudahuel</th><th style="text-align:right">Presencial</th>
            <th style="text-align:right">Antofagasta</th><th style="text-align:right">Res. APRO</th><th style="text-align:right">Recepción</th>
            <th style="background:rgba(200,169,122,0.06)">Fecha</th><th style="background:rgba(200,169,122,0.06);text-align:right">Cant. Disp.</th>
          </tr></thead><tbody>`+
        hmMap[hm][col].map(r=>`<tr>
          <td>${esc(String(r['Descripcion']||r['Descripción']||''))}</td>
          <td style="font-family:monospace;font-size:12px">${esc(String(r['Codigo']||''))}</td>
          <td style="font-family:monospace;font-size:12px">${esc(String(r['Cod APRO']||''))}</td>
          <td style="font-family:monospace;font-size:12px">${esc(String(r['EAN13']||''))}</td>
          <td style="text-align:center">${esc(String(r['Cant x Caja']||''))}</td>
          <td style="text-align:right">${fmtS(r['Pudahuel'])}</td><td style="text-align:right">${fmtS(r['Presencial'])}</td>
          <td style="text-align:right">${fmtS(r['Antofagasta'])}</td><td style="text-align:right">${fmtS(r['Reserva APRO'])}</td>
          <td style="text-align:right">${fmtS(r['Recepción']||r['Recepcion']||'')}</td>
          <td style="background:rgba(200,169,122,0.04);font-size:12px">${fmtF(r['Fecha Prox Llegada'])}</td>
          <td style="background:rgba(200,169,122,0.04);text-align:right">${esc(String(r['Ctd prox llegada (disponible)']??r['Ctd prox llegada (Disponible)']??'—'))}</td>
        </tr>`).join('')+
        '</tbody></table></div></div>';
    });
  });
  html+='</div></div>';
  document.getElementById('prod-detail-content').innerHTML=html;
}

// ── ADMIN ──
function renderAdminUsers(filter=''){
  const list=document.getElementById('admin-users-list'); if(!list) return;
  const nf=norm(filter);
  const shown=USERS.filter(u=>!nf||norm(u.nombre).includes(nf)||norm(u.sucursal||'').includes(nf)||norm(u.mail).includes(nf));
  if(!shown.length){list.innerHTML='<div style="padding:2rem;text-align:center;color:var(--warm-gray)">Sin resultados</div>';return;}
  list.innerHTML=shown.map(u=>`
    <div class="user-row ${editingUserId===u.id?'selected':''}" onclick="editUser(${u.id})">
      <div>
        <div class="user-name"><span class="status-dot ${u.activo?'active':'inactive'}"></span>${esc(u.nombre)}</div>
        <div class="user-meta">${esc(u.sucursal||'')} · ${esc(u.mail)} · <span style="text-transform:uppercase;font-size:11px">${u.rol}</span></div>
      </div>
      <label class="toggle-switch" onclick="event.stopPropagation()">
        <input type="checkbox" ${u.activo?'checked':''} onchange="toggleUser(${u.id},this.checked)">
        <span class="toggle-slider"></span>
      </label>
    </div>`).join('');
}
function newUser(){editingUserId=null;document.getElementById('form-title').textContent='Nuevo usuario';['f-nombre','f-sucursal','f-mail','f-pass'].forEach(id=>document.getElementById(id).value='');document.getElementById('f-rol').value='user';document.getElementById('btn-delete').style.display='none';renderAdminUsers(document.getElementById('admin-search').value);}
function editUser(id){const u=USERS.find(x=>x.id===id);if(!u)return;editingUserId=id;document.getElementById('form-title').textContent='Editar usuario';document.getElementById('f-nombre').value=u.nombre;document.getElementById('f-sucursal').value=u.sucursal||'';document.getElementById('f-mail').value=u.mail;document.getElementById('f-pass').value=u.pass;document.getElementById('f-rol').value=u.rol;document.getElementById('btn-delete').style.display='';renderAdminUsers(document.getElementById('admin-search').value);}
function saveUser(){const nombre=document.getElementById('f-nombre').value.trim();const sucursal=document.getElementById('f-sucursal').value.trim();const mail=document.getElementById('f-mail').value.trim();const pass=document.getElementById('f-pass').value;const rol=document.getElementById('f-rol').value;if(!nombre||!mail||!pass){showToast('Nombre, correo y contraseña son requeridos',true);return;}if(editingUserId){Object.assign(USERS.find(x=>x.id===editingUserId),{nombre,sucursal,mail,pass,rol});}else{USERS.push({id:Date.now(),nombre,sucursal,mail,pass,rol,activo:true});}saveUsers();newUser();showToast('Usuario guardado');}
function cancelUser(){newUser();}
function deleteUser(){if(!editingUserId)return;if(!confirm('¿Eliminar este usuario?'))return;USERS=USERS.filter(x=>x.id!==editingUserId);saveUsers();newUser();showToast('Usuario eliminado');}
function toggleUser(id,val){const u=USERS.find(x=>x.id===id);if(u){u.activo=val;saveUsers();}}

// ── HELPERS ──
function norm(s){return String(s||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').trim();}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function fmtS(v){if(v===''||v===null||v===undefined)return '<span class="muted">—</span>';const s=String(v).trim();const neg=s.startsWith('(')||s.startsWith('-');const n=parseFloat(s.replace(/[()]/g,''));if(!isNaN(n)&&(n<0||neg))return `<span class="neg">-${Math.abs(n)}</span>`;return esc(s);}
function fmtN(v){if(v===''||v===null||v===undefined)return '<span class="muted">—</span>';const n=parseFloat(v);if(!isNaN(n)&&n<0)return `<span class="neg">${n}</span>`;return esc(String(v));}
function fmtF(v){if(!v||v==='')return '<span class="muted">—</span>';if(v instanceof Date)return esc(v.toLocaleDateString('es-CL'));const s=String(v);if(s.match(/^\d{4}-\d{2}-\d{2}/))return esc(new Date(s).toLocaleDateString('es-CL'));return esc(s);}
function fmtP(v){if(!v)return '';const n=parseFloat(String(v).replace(/[^0-9.]/g,''));if(isNaN(n))return esc(String(v));return '$'+n.toLocaleString('es-CL');}
function showLoading(msg,sub){document.getElementById('loading-msg').textContent=msg||'Cargando...';document.getElementById('loading-sub').textContent=sub||'';document.getElementById('loading-overlay').style.display='flex';}
function hideLoading(){document.getElementById('loading-overlay').style.display='none';}
function showToast(msg,isError=false){const t=document.getElementById('toast');t.textContent=msg;t.className='toast'+(isError?' error':'');t.classList.add('show');setTimeout(()=>t.classList.remove('show'),3500);}
</script>
